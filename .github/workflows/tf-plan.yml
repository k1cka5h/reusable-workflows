name: Terraform Plan

# Reusable workflow — call with:
#   uses: k1cka5h/reusable-workflows/.github/workflows/tf-plan.yml@main
#   with:
#     environment:    dev
#     var_file:       dev/terraform.tfvars
#     backend_config: dev/backend.hcl
#   secrets:
#     azure_client_id:       ${{ secrets.DEV_AZURE_CLIENT_ID }}
#     azure_subscription_id: ${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}
#     azure_tenant_id:       ${{ vars.AZURE_TENANT_ID }}
#     tf_modules_deploy_key: ${{ secrets.TF_MODULES_DEPLOY_KEY }}
#     # App-specific TF vars — omit secrets not needed by your stack:
#     tf_var_db_password:    ${{ secrets.DB_ADMIN_PASSWORD }}
#     tf_var_log_workspace:  ${{ secrets.LOG_WORKSPACE_ID }}

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment name used to label the PR plan comment (dev/qa/stage/prod)."
        type: string
        required: true
      working_directory:
        description: "Directory containing the Terraform root module."
        type: string
        default: shared
      var_file:
        description: "Path to the .tfvars file, relative to the repo root."
        type: string
        required: true
      backend_config:
        description: "Path to the backend.hcl file, relative to the repo root."
        type: string
        required: true
      policy_dir:
        description: "Path to the OPA policy directory."
        type: string
        default: policy/
      terraform_version:
        description: "Terraform CLI version."
        type: string
        default: "1.7.5"
      conftest_version:
        description: "Conftest version for OPA policy checks."
        type: string
        default: "0.51.0"
    secrets:
      azure_client_id:
        description: "Azure service principal client ID for this environment."
        required: true
      azure_subscription_id:
        description: "Azure subscription ID for this environment."
        required: true
      azure_tenant_id:
        description: "Azure AD tenant ID."
        required: true
      tf_modules_deploy_key:
        description: "Read-only SSH deploy key for the private Terraform module repo."
        required: true
      # App-specific sensitive Terraform variables.
      # Declare what your stack needs; omit what it doesn't.
      tf_var_db_password:
        description: "Passed as TF_VAR_administrator_password. Optional."
        required: false
      tf_var_log_workspace:
        description: "Passed as TF_VAR_log_analytics_workspace_id. Optional."
        required: false

jobs:
  plan:
    name: Plan / ${{ inputs.environment }}
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID:       ${{ secrets.azure_client_id }}
      ARM_TENANT_ID:       ${{ secrets.azure_tenant_id }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.azure_subscription_id }}
      ARM_USE_OIDC:        "true"
      TF_IN_AUTOMATION:    "true"
      TF_INPUT:            "false"
      # App-specific TF vars — only set when the secret is provided.
      TF_VAR_administrator_password:     ${{ secrets.tf_var_db_password }}
      TF_VAR_log_analytics_workspace_id: ${{ secrets.tf_var_log_workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.tf_modules_deploy_key }}

      - name: Init
        run: |
          terraform -chdir=${{ inputs.working_directory }} init \
            -backend-config=../${{ inputs.backend_config }}

      - name: Plan
        run: |
          terraform -chdir=${{ inputs.working_directory }} plan \
            -var-file=../${{ inputs.var_file }} \
            -out=tfplan \
            2>&1 | tee ${{ inputs.working_directory }}/plan.txt

      - name: Install conftest
        run: |
          curl -sLo conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${{ inputs.conftest_version }}/conftest_${{ inputs.conftest_version }}_Linux_x86_64.tar.gz"
          tar -xzf conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/

      - name: Policy check
        run: |
          terraform -chdir=${{ inputs.working_directory }} show -json tfplan > tfplan.json
          conftest test tfplan.json \
            --policy ${{ inputs.policy_dir }} \
            --data <(printf '{"environment":"%s"}' "${{ inputs.environment }}") \
            --output github

      - name: Post plan comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('${{ inputs.working_directory }}/plan.txt', 'utf8');
            const body = raw.length > 50000
              ? raw.slice(0, 50000) + '\n\n_Plan truncated — see full output in workflow logs._'
              : raw;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform plan — **${{ inputs.environment }}**\n\`\`\`hcl\n${body}\n\`\`\``,
            });
