name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  test:
    name: Workflow trigger tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install
        run: pip install -r tests/requirements.txt

      - name: Test
        run: pytest tests/ -v --tb=short

  tag-check:
    name: Enforce semver tag on release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must follow vMAJOR.MINOR.PATCH (got ${{ github.ref_name }})"
            exit 1
          fi
